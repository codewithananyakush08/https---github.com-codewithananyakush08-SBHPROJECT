{% extends 'contractorbase.html' %}
{% block contractor %}
{% load static %}
<h3>Progress update for <span class="text-primary">{{ project.projectname }}</span></h3>
<form action="" method="post" enctype="multipart/form-data" class="w-75 mx-auto">
    {% csrf_token %}
    <div class="mb-3">
        <label for="ut" class="form-label">Update Text</label>
        <textarea name="update_text" id="ut" class="form-control"></textarea>
    </div>
    <div class="mb-3">
        <label for="f" class="form-label" required> Upload File</label>
        <input type="file" name="image" id="f" class="form-control">
    </div>
    <div class="mb-3">
        <label for="d" class="form-label">Progress Percent</label>
        <input type="number" value="{{project.progress}}" name="progress_percent" id="d" class="form-control"  required>
    </div>
    <div class="text-center">
        <button type="submit" class="btn btn-success"   >Submit</button>
    </div>

</form>


{% endblock %}
