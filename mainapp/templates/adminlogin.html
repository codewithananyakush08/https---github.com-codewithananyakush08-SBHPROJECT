{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login</title>
    <link rel="stylesheet" href="{% static 'css/bootstrap.css'%}">
    <link rel="stylesheet" href="{% static 'css/style.css'%}">
</head>

<body style="background-color: #151828;">
    <div class="container-fluid">
        <div class="row" style="height:100vh;">
            <div class="col-sm-4 mx-auto my-auto">
                <div class="card-form py-5 px-5">
                    <div class="text-center">
                        <img src="{% static 'img/img.png' %}" height="70px;">
                    </div>
                    <h4 class="text-center">Welcome Admin</h4>
                    {% if messages %}
                    {% for m in messages %}
                    <div class="alert alert-warning alert-dismissible fade show" role="alert">
                        {{m}}
                        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
                    </div>
                    {% endfor %}
                    {% endif %}
                    <form method="post">
                        {% csrf_token %}
                        <div class="form-floating mb-3">
                            <input type="text" name="username" class="form-control" id="floatingInput"
                                placeholder="name@example.com">
                            <label for="floatingInput">Username</label>
                        </div>
                        <div class="form-floating">
                            <input type="password" name="password" class="form-control" id="floatingPassword"
                                placeholder="Password">
                            <label for="floatingPassword">Password</label>
                        </div>
                        <button type="submit" class="btn btn-dark mt-4 w-100">Login</button>
                        <p class="py-3">&copy; Smart bulid hub</p><a href="{% url 'index' %}"
                            class="float-end fw-semibold">Back to
                            home</a>
                    </form>
                </div>
            </div>
        </div>
    </div>
    <script src="{% static 'js/bootstrap.bundle.js' %}"></script>
</body>

</html>
